<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b211d" />
    <title>Questland · Real-Life Games</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-shell" id="top">
      <header class="site-header" data-header>
        <a class="brand" href="#top" data-aria-i18n="brandLabel">
          <span class="brand-mark" aria-hidden="true">
            <span class="brand-mark__orb"></span>
            <span class="brand-mark__needle"></span>
          </span>
          <span class="brand-copy">
            <span class="brand-name">QUESTLAND</span>
            <span class="brand-descriptor" data-i18n="brandDescriptor"></span>
          </span>
        </a>

        <nav class="primary-nav" id="primary-nav" aria-label="Hauptnavigation" data-aria-i18n="navLabel">
          <a href="#missions" data-i18n="navMissions"></a>
          <a href="#journey" data-i18n="navJourney"></a>
          <a href="#why-questland" data-i18n="navWhy"></a>
          <a href="#about" data-i18n="navAbout"></a>
          <a class="nav-cta" href="#request" data-i18n="navCta"></a>
        </nav>

        <div class="header-actions">
          <div class="language-switch" role="group" data-aria-i18n="languageLabel">
            <button class="language-button is-active" type="button" data-lang="de" aria-pressed="true">DE</button>
            <span aria-hidden="true">/</span>
            <button class="language-button" type="button" data-lang="en" aria-pressed="false">EN</button>
          </div>
          <button class="menu-toggle" type="button" aria-expanded="false" data-aria-i18n="menuOpen">
            <span class="menu-toggle__line"></span>
            <span class="menu-toggle__line"></span>
            <span class="menu-toggle__line"></span>
            <span class="sr-only" data-i18n="menuOpen"></span>
          </button>
        </div>
      </header>

      <main>
        <section class="hero" aria-labelledby="hero-title">
          <div class="hero-visual" aria-hidden="true">
            <div class="hero-visual__glow hero-visual__glow--sun"></div>
            <div class="hero-visual__glow hero-visual__glow--blue"></div>
            <div class="hero-visual__grid"></div>
            <div class="hero-visual__mountains hero-visual__mountains--back"></div>
            <div class="hero-visual__mountains hero-visual__mountains--front"></div>
            <div class="hero-visual__tree-line"></div>
            <div class="hero-visual__trail"></div>
            <div class="hero-visual__stars"></div>
          </div>

          <div class="hero-content page-width">
            <div class="hero-copy">
              <p class="eyebrow"><span class="eyebrow__dot"></span><span data-i18n="heroEyebrow"></span></p>
              <h1 id="hero-title">
                <span data-i18n="heroTitleLead"></span>
                <em data-i18n="heroTitleAccent"></em>
              </h1>
              <p class="hero-intro" data-i18n="heroIntro"></p>
              <div class="hero-actions">
                <a class="button button--primary" href="#compass" data-i18n="heroPrimaryCta"></a>
                <a class="button button--ghost" href="#request" data-i18n="heroSecondaryCta"></a>
              </div>
              <div class="hero-proof" aria-label="" data-aria-i18n="heroProofLabel">
                <span data-i18n="proofMonster"></span>
                <span data-i18n="proofBattles"></span>
                <span data-i18n="proofAdventure"></span>
                <span data-i18n="proofDeduction"></span>
                <span data-i18n="proofMissions"></span>
              </div>
            </div>

            <div class="mission-panel" aria-label="" data-aria-i18n="missionPanelLabel">
              <div class="mission-panel__topline">
                <span class="mission-panel__code" data-i18n="panelCode"></span>
                <span class="mission-panel__status"><span></span><span data-i18n="panelStatus"></span></span>
              </div>
              <div class="mission-panel__scene" aria-hidden="true">
                <div class="scene-sun"></div>
                <div class="scene-moon"></div>
                <div class="scene-mountain scene-mountain--one"></div>
                <div class="scene-mountain scene-mountain--two"></div>
                <div class="scene-forest"></div>
                <div class="scene-path"></div>
                <div class="scene-compass"><span></span></div>
                <div class="scene-person scene-person--one"></div>
                <div class="scene-person scene-person--two"></div>
              </div>
              <div class="mission-panel__details">
                <div>
                  <span class="detail-label" data-i18n="panelObjectiveLabel"></span>
                  <strong data-i18n="panelObjective"></strong>
                </div>
                <div>
                  <span class="detail-label" data-i18n="panelTerrainLabel"></span>
                  <strong data-i18n="panelTerrain"></strong>
                </div>
              </div>
              <div class="mission-panel__tags">
                <span data-i18n="tagTeamplay"></span>
                <span data-i18n="tagOutdoor"></span>
                <span data-i18n="tagStory"></span>
              </div>
            </div>
          </div>

          <a class="hero-scroll" href="#compass" data-aria-i18n="scrollLabel">
            <span class="hero-scroll__line"></span>
            <span data-i18n="scrollLabel"></span>
          </a>
        </section>

        <section class="section compass-section" id="compass" aria-labelledby="compass-title">
          <div class="page-width">
            <div class="section-heading section-heading--split">
              <div>
                <p class="section-kicker" data-i18n="compassKicker"></p>
                <h2 id="compass-title" data-i18n="compassTitle"></h2>
              </div>
              <p class="section-lede" data-i18n="compassIntro"></p>
            </div>

            <div class="questgiver-scene">
              <div class="questgiver-dialog" data-finder-dialog aria-label="" data-aria-i18n="dialogLabel">
                <div class="questgiver-bubble">
                  <div class="questgiver-speech">
                    <p class="questgiver-message" role="status" aria-live="polite" data-questgiver-message data-i18n="questgiverGreeting"></p>
                  </div>

                  <div class="dialog-intro" data-dialog-intro>
                    <button class="button button--primary" type="button" data-action="finder-start" data-i18n="dialogStart"></button>
                  </div>

                  <div class="dialog-question-shell" data-dialog-question-shell hidden>
                  <div class="dialog-question" data-finder-step="0" data-finder-question="audience">
                    <fieldset class="dialog-fieldset">
                      <legend class="sr-only" data-i18n="questionOneTitle"></legend>
                      <div class="option-grid option-grid--three">
                        <button class="option-button" type="button" data-finder-group="audience" data-finder-value="school" data-finder-answer>
                          <span class="option-icon option-icon--flag" aria-hidden="true"></span>
                          <span data-i18n="audienceSchool"></span>
                        </button>
                        <button class="option-button" type="button" data-finder-group="audience" data-finder-value="event" data-finder-answer>
                          <span class="option-icon option-icon--spark" aria-hidden="true"></span>
                          <span data-i18n="audienceEvent"></span>
                        </button>
                        <button class="option-button" type="button" data-finder-group="audience" data-finder-value="private" data-finder-answer>
                          <span class="option-icon option-icon--people" aria-hidden="true"></span>
                          <span data-i18n="audiencePrivate"></span>
                        </button>
                      </div>
                    </fieldset>
                  </div>

                  <div class="dialog-question" data-finder-step="1" data-finder-question="ages" hidden>
                    <fieldset class="dialog-fieldset">
                      <legend class="sr-only" data-i18n="questionTwoTitle"></legend>
                      <div class="option-grid option-grid--four">
                        <button class="option-button" type="button" data-finder-group="ages" data-finder-value="5-7" data-finder-answer>
                          <span class="option-icon option-icon--people" aria-hidden="true"></span>
                          <span data-i18n="age57"></span>
                        </button>
                        <button class="option-button" type="button" data-finder-group="ages" data-finder-value="8-11" data-finder-answer>
                          <span class="option-icon option-icon--people" aria-hidden="true"></span>
                          <span data-i18n="age811"></span>
                        </button>
                        <button class="option-button" type="button" data-finder-group="ages" data-finder-value="12-15" data-finder-answer>
                          <span class="option-icon option-icon--people" aria-hidden="true"></span>
                          <span data-i18n="age1215"></span>
                        </button>
                        <button class="option-button" type="button" data-finder-group="ages" data-finder-value="16+" data-finder-answer>
                          <span class="option-icon option-icon--people" aria-hidden="true"></span>
                          <span data-i18n="age16"></span>
                        </button>
                      </div>
                    </fieldset>
                  </div>

                  <div class="dialog-question" data-finder-step="2" data-finder-question="groupSize" hidden>
                    <fieldset class="dialog-fieldset">
                      <legend class="sr-only" data-i18n="questionThreeTitle"></legend>
                      <div class="option-grid option-grid--three">
                        <button class="option-button" type="button" data-finder-group="groupSize" data-finder-value="2-5" data-finder-answer>
                          <span class="option-icon option-icon--people" aria-hidden="true"></span>
                          <span data-i18n="groupSmall"></span>
                        </button>
                        <button class="option-button" type="button" data-finder-group="groupSize" data-finder-value="6-20" data-finder-answer>
                          <span class="option-icon option-icon--people" aria-hidden="true"></span>
                          <span data-i18n="groupMedium"></span>
                        </button>
                        <button class="option-button" type="button" data-finder-group="groupSize" data-finder-value="20+" data-finder-answer>
                          <span class="option-icon option-icon--people" aria-hidden="true"></span>
                          <span data-i18n="groupLarge"></span>
                        </button>
                      </div>
                    </fieldset>
                  </div>

                  <div class="dialog-question" data-finder-step="3" data-finder-question="style" hidden>
                    <fieldset class="dialog-fieldset">
                      <legend class="sr-only" data-i18n="questionFourTitle"></legend>
                      <div class="option-grid option-grid--three">
                        <button class="option-button" type="button" data-finder-group="style" data-finder-value="action" data-finder-answer>
                          <span class="option-icon option-icon--bolt" aria-hidden="true"></span>
                          <span data-i18n="styleAction"></span>
                        </button>
                        <button class="option-button" type="button" data-finder-group="style" data-finder-value="adventure" data-finder-answer>
                          <span class="option-icon option-icon--key" aria-hidden="true"></span>
                          <span data-i18n="styleAdventure"></span>
                        </button>
                        <button class="option-button" type="button" data-finder-group="style" data-finder-value="mix" data-finder-answer>
                          <span class="option-icon option-icon--compass" aria-hidden="true"></span>
                          <span data-i18n="styleMix"></span>
                        </button>
                      </div>
                    </fieldset>
                  </div>
                  </div>

                  <div class="quest-profile quest-profile--inline" aria-label="" data-aria-i18n="profileLabel" hidden>
                    <span class="sr-only" data-profile-status data-i18n="profileEmpty"></span>
                    <div class="quest-profile__chips" data-quest-profile-list aria-live="polite"></div>
                  </div>

                  <div class="dialog-completion" data-dialog-completion hidden aria-live="polite">
                    <p class="sr-only" data-i18n="dialogCompletionTitle"></p>
                    <button class="button button--primary" type="button" data-action="show-quests" data-i18n="dialogShowQuests"></button>
                  </div>

                  <div class="dialog-actions" data-dialog-actions>
                    <button class="dialog-back" type="button" data-action="finder-back" data-i18n="dialogBack"></button>
                    <button class="button button--primary dialog-next" type="button" data-action="finder-continue" data-i18n="dialogContinue"></button>
                  </div>
                  <p class="dialog-status sr-only" role="status" aria-live="polite" data-dialog-status></p>
                </div>
              </div>

              <div class="questgiver-portrait" data-questgiver-portrait aria-hidden="true">
                <div class="questgiver-portrait__halo"></div>
                <svg viewBox="0 0 180 220" role="presentation">
                  <path d="M39 214c4-45 30-69 51-69s47 24 51 69" fill="var(--forest-700)" opacity=".18" />
                  <path d="M37 214c4-42 26-63 53-63s49 21 53 63" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
                  <path d="M52 156c11 15 22 21 38 21s28-6 39-21" fill="none" stroke="currentColor" stroke-width="2" opacity=".58" />
                  <path d="M57 92c0-31 17-55 39-55s39 24 39 55v24c0 25-17 44-39 44s-39-19-39-44z" fill="var(--paper)" stroke="currentColor" stroke-width="3" />
                  <path d="M55 95c-2-41 13-68 42-68 28 0 43 26 40 68-8-18-19-27-39-29-15 12-27 17-43 29z" fill="var(--forest-900)" />
                  <path d="M73 103h5m24 0h5M80 125c7 5 13 5 20 0" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
                  <path d="M84 114c3 2 9 2 12 0" fill="none" stroke="var(--orange)" stroke-width="2" stroke-linecap="round" />
                  <path d="M55 72h82" fill="none" stroke="var(--lime)" stroke-width="4" stroke-linecap="round" />
                  <path d="M126 167l16 8-16 8-8 16-8-16-16-8 16-8 8-16z" fill="var(--orange)" />
                  <circle cx="146" cy="50" r="17" fill="var(--paper)" stroke="currentColor" stroke-width="2" />
                  <path d="M146 38v24m-12-12h24" stroke="var(--forest-700)" stroke-width="2" stroke-linecap="round" />
                </svg>
                <span class="questgiver-portrait__label" data-i18n="questgiverPortraitLabel"></span>
              </div>
            </div>

          </div>
        </section>

        <section class="section missions-section" id="missions" aria-labelledby="missions-title">
          <div class="page-width">
            <div class="section-heading">
              <p class="section-kicker" data-i18n="missionsKicker"></p>
              <h2 id="missions-title" data-i18n="missionsTitle"></h2>
              <p class="section-lede" data-i18n="missionsIntro"></p>
            </div>

            <div class="play-type-groups" data-play-type-groups>
              <section class="play-type-group play-type-group--recommended" data-play-type-group="recommended" hidden aria-live="polite" aria-labelledby="recommended-play-types-title">
                <div class="play-type-group__header">
                  <p class="section-kicker" id="recommended-play-types-title" data-i18n="missionsRecommendedHeading"></p>
                  <p data-i18n="missionsRecommendedIntro"></p>
                </div>
                <div class="play-type-grid" data-play-type-list-recommended></div>
              </section>

              <section class="play-type-group play-type-group--additional" data-play-type-group="additional" hidden aria-labelledby="additional-play-types-title">
                <div class="play-type-group__header">
                  <p class="section-kicker" id="additional-play-types-title" data-i18n="missionsAdditionalHeading"></p>
                  <p data-i18n="missionsAdditionalIntro"></p>
                </div>
                <div class="play-type-grid" data-play-type-list-additional></div>
              </section>

              <section class="play-type-group play-type-group--neutral" data-play-type-group="neutral" aria-labelledby="all-play-types-title">
                <div class="play-type-group__header play-type-group__header--neutral">
                  <p class="section-kicker" id="all-play-types-title" data-i18n="missionsNeutralHeading"></p>
                </div>
                <div class="play-type-grid" data-play-type-list-neutral>
              <article class="mission-card mission-card--banner mission-card--monster" data-play-type-card="monsterHunt">
                <div class="media-slot media-slot--monster" aria-hidden="true">
                  <span class="media-slot__label" data-i18n="mediaMonsterLabel"></span>
                  <div class="type-visual__orb"></div>
                  <div class="type-visual__trail"></div>
                </div>
                <div class="mission-card__body">
                  <div class="card-meta" data-play-type-meta></div>
                  <h3 data-play-type-title></h3>
                  <p data-play-type-teaser></p>
                  <div class="mission-banner__footer">
                    <span class="mission-banner__status" data-play-type-status hidden></span>
                    <button class="mission-banner__toggle" type="button" data-action="toggle-play-type" data-play-type-toggle="monsterHunt" data-play-type="monsterHunt" aria-expanded="false" aria-controls="play-type-details-monsterHunt">
                      <span data-i18n="cardDetails"></span><span aria-hidden="true">↗</span>
                    </button>
                  </div>
                </div>
                <div class="mission-banner__details" id="play-type-details-monsterHunt" data-play-type-details hidden></div>
              </article>

              <article class="mission-card mission-card--banner mission-card--team" data-play-type-card="teamBattles">
                <div class="media-slot media-slot--team" aria-hidden="true">
                  <span class="media-slot__label" data-i18n="mediaTeamLabel"></span>
                  <div class="media-slot__energy"></div>
                  <div class="media-slot__flag"></div>
                </div>
                <div class="mission-card__body">
                  <div class="card-meta" data-play-type-meta></div>
                  <h3 data-play-type-title></h3>
                  <p data-play-type-teaser></p>
                  <div class="mission-banner__footer">
                    <span class="mission-banner__status" data-play-type-status hidden></span>
                    <button class="mission-banner__toggle" type="button" data-action="toggle-play-type" data-play-type-toggle="teamBattles" data-play-type="teamBattles" aria-expanded="false" aria-controls="play-type-details-teamBattles">
                      <span data-i18n="cardDetails"></span><span aria-hidden="true">↗</span>
                    </button>
                  </div>
                </div>
                <div class="mission-banner__details" id="play-type-details-teamBattles" data-play-type-details hidden></div>
              </article>

              <article class="mission-card mission-card--banner mission-card--adventure" data-play-type-card="adventure">
                <div class="media-slot media-slot--adventure" aria-hidden="true">
                  <span class="media-slot__label" data-i18n="mediaAdventureLabel"></span>
                  <div class="media-slot__moon"></div>
                  <div class="media-slot__ridge"></div>
                  <div class="media-slot__trail"></div>
                </div>
                <div class="mission-card__body">
                  <div class="card-meta" data-play-type-meta></div>
                  <h3 data-play-type-title></h3>
                  <p data-play-type-teaser></p>
                  <div class="mission-banner__footer">
                    <span class="mission-banner__status" data-play-type-status hidden></span>
                    <button class="mission-banner__toggle" type="button" data-action="toggle-play-type" data-play-type-toggle="adventure" data-play-type="adventure" aria-expanded="false" aria-controls="play-type-details-adventure">
                      <span data-i18n="cardDetails"></span><span aria-hidden="true">↗</span>
                    </button>
                  </div>
                </div>
                <div class="mission-banner__details" id="play-type-details-adventure" data-play-type-details hidden></div>
              </article>

              <article class="mission-card mission-card--banner mission-card--deduction" data-play-type-card="deduction">
                <div class="media-slot media-slot--deduction" aria-hidden="true">
                  <span class="media-slot__label" data-i18n="mediaDeductionLabel"></span>
                  <div class="type-visual__cards"></div>
                  <div class="type-visual__eye"></div>
                </div>
                <div class="mission-card__body">
                  <div class="card-meta" data-play-type-meta></div>
                  <h3 data-play-type-title></h3>
                  <p data-play-type-teaser></p>
                  <div class="mission-banner__footer">
                    <span class="mission-banner__status" data-play-type-status hidden></span>
                    <button class="mission-banner__toggle" type="button" data-action="toggle-play-type" data-play-type-toggle="deduction" data-play-type="deduction" aria-expanded="false" aria-controls="play-type-details-deduction">
                      <span data-i18n="cardDetails"></span><span aria-hidden="true">↗</span>
                    </button>
                  </div>
                </div>
                <div class="mission-banner__details" id="play-type-details-deduction" data-play-type-details hidden></div>
              </article>

              <article class="mission-card mission-card--banner mission-card--missions" data-play-type-card="missions">
                <div class="media-slot media-slot--missions" aria-hidden="true">
                  <span class="media-slot__label" data-i18n="mediaMissionsLabel"></span>
                  <div class="type-visual__rings"></div>
                  <div class="type-visual__star"></div>
                  <div class="type-visual__route"></div>
                </div>
                <div class="mission-card__body">
                  <div class="card-meta" data-play-type-meta></div>
                  <h3 data-play-type-title></h3>
                  <p data-play-type-teaser></p>
                  <div class="mission-banner__footer">
                    <span class="mission-banner__status" data-play-type-status hidden></span>
                    <button class="mission-banner__toggle" type="button" data-action="toggle-play-type" data-play-type-toggle="missions" data-play-type="missions" aria-expanded="false" aria-controls="play-type-details-missions">
                      <span data-i18n="cardDetails"></span><span aria-hidden="true">↗</span>
                    </button>
                  </div>
                </div>
                <div class="mission-banner__details" id="play-type-details-missions" data-play-type-details hidden></div>
              </article>
                </div>
              </section>
            </div>
          </div>
        </section>

        <section class="section journey-section" id="journey" aria-labelledby="journey-title">
          <div class="page-width">
            <div class="section-heading section-heading--split">
              <div>
                <p class="section-kicker" data-i18n="journeyKicker"></p>
                <h2 id="journey-title" data-i18n="journeyTitle"></h2>
              </div>
              <p class="section-lede" data-i18n="journeyIntro"></p>
            </div>
            <div class="journey-flow" data-journey-flow>
              <article class="journey-step journey-step--idea">
                <div class="journey-step__marker">01</div>
                <p class="journey-phase__label" data-i18n="journeyStepOneLabel"></p>
                <h3 data-i18n="journeyStepOneTitle"></h3>
                <p data-i18n="journeyStepOneText"></p>
              </article>
              <article class="journey-step journey-step--concept">
                <div class="journey-step__marker">02</div>
                <p class="journey-phase__label" data-i18n="journeyStepTwoLabel"></p>
                <h3 data-i18n="journeyStepTwoTitle"></h3>
                <p data-i18n="journeyStepTwoText"></p>
              </article>
              <article class="journey-step journey-step--location">
                <div class="journey-step__marker">03</div>
                <p class="journey-phase__label" data-i18n="journeyStepThreeLabel"></p>
                <h3 data-i18n="journeyStepThreeTitle"></h3>
                <p data-i18n="journeyStepThreeText"></p>
              </article>
              <article class="journey-step journey-step--date">
                <div class="journey-step__marker">04</div>
                <p class="journey-phase__label" data-i18n="journeyStepFourLabel"></p>
                <h3 data-i18n="journeyStepFourTitle"></h3>
                <p data-i18n="journeyStepFourText"></p>
              </article>
              <article class="journey-step journey-step--equipment">
                <div class="journey-step__marker">05</div>
                <p class="journey-phase__label" data-i18n="journeyStepFiveLabel"></p>
                <h3 data-i18n="journeyStepFiveTitle"></h3>
                <p data-i18n="journeyStepFiveText"></p>
              </article>
              <article class="journey-step journey-step--start">
                <div class="journey-step__marker">06</div>
                <p class="journey-phase__label" data-i18n="journeyStepSixLabel"></p>
                <h3 data-i18n="journeyStepSixTitle"></h3>
                <p data-i18n="journeyStepSixText"></p>
              </article>
            </div>
          </div>
        </section>

        <section class="section why-section" id="why-questland" aria-labelledby="why-title">
          <div class="page-width why-layout">
            <div class="why-copy">
              <p class="section-kicker" data-i18n="whyKicker"></p>
              <h2 id="why-title" data-i18n="whyTitle"></h2>
              <p data-i18n="whyIntro"></p>
            </div>
            <div class="why-points">
              <article class="why-point why-point--game">
                <span class="why-icon why-icon--game" aria-hidden="true"></span>
                <div>
                  <h3 data-i18n="whyGameTitle"></h3>
                  <p data-i18n="whyGameText"></p>
                </div>
              </article>
              <article class="why-point why-point--custom">
                <span class="why-icon why-icon--custom" aria-hidden="true"></span>
                <div>
                  <h3 data-i18n="whyCustomTitle"></h3>
                  <p data-i18n="whyCustomText"></p>
                </div>
              </article>
              <article class="why-point why-point--field">
                <span class="why-icon why-icon--field" aria-hidden="true"></span>
                <div>
                  <h3 data-i18n="whyFieldTitle"></h3>
                  <p data-i18n="whyFieldText"></p>
                </div>
              </article>
              <article class="why-point why-point--guided">
                <span class="why-icon why-icon--guided" aria-hidden="true"></span>
                <div>
                  <h3 data-i18n="whyGuidedTitle"></h3>
                  <p data-i18n="whyGuidedText"></p>
                </div>
              </article>
            </div>
          </div>
        </section>

        <section class="section log-section" id="about" aria-labelledby="log-title">
          <div class="page-width">
            <div class="section-heading section-heading--split">
              <div>
                <p class="section-kicker" data-i18n="logKicker"></p>
                <h2 id="log-title" data-i18n="logTitle"></h2>
              </div>
              <p class="section-lede" data-i18n="logIntro"></p>
            </div>
            <div class="log-list">
              <article class="log-entry">
                <span class="log-entry__number">01</span>
                <div class="log-entry__marker log-entry__marker--monster" aria-hidden="true"></div>
                <div class="log-entry__copy">
                  <p class="log-entry__type" data-i18n="logMonsterType"></p>
                  <h3 data-i18n="logMonsterTitle"></h3>
                  <p data-i18n="logMonsterText"></p>
                </div>
                <span class="log-entry__badge" data-i18n="logMonsterBadge"></span>
              </article>
              <article class="log-entry log-entry--case-file">
                <span class="log-entry__number">02</span>
                <div class="log-entry__marker log-entry__marker--operation" aria-hidden="true"></div>
                <div class="log-entry__copy">
                  <p class="log-entry__type" data-i18n="logOperationType"></p>
                  <h3 data-i18n="logOperationTitle"></h3>
                  <p data-i18n="logOperationText"></p>
                </div>
                <span class="log-entry__badge" data-i18n="logOperationBadge"></span>
              </article>
            </div>
          </div>
        </section>

        <section class="section request-section" id="request" aria-labelledby="request-title">
          <div class="page-width">
            <div class="request-panel">
              <div class="request-panel__glow" aria-hidden="true"></div>
              <p class="section-kicker" data-i18n="requestKicker"></p>
              <h2 id="request-title" data-i18n="requestTitle"></h2>
              <p data-i18n="requestText"></p>
              <div class="request-actions">
                <button class="button button--primary" type="button" data-action="simulate-contact" data-i18n="requestPrimary"></button>
                <button class="button button--light" type="button" data-action="simulate-contact" data-i18n="requestSecondary"></button>
              </div>
              <p class="request-status" id="contact-status" role="status" aria-live="polite"></p>
            </div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="page-width footer-inner">
          <div>
            <a class="brand brand--footer" href="#top" data-aria-i18n="brandLabel">
              <span class="brand-mark" aria-hidden="true"><span class="brand-mark__orb"></span><span class="brand-mark__needle"></span></span>
              <span class="brand-copy"><span class="brand-name">QUESTLAND</span><span class="brand-descriptor" data-i18n="brandDescriptor"></span></span>
            </a>
            <p class="footer-note" data-i18n="footerNote"></p>
          </div>
          <div class="footer-contact">
            <span data-i18n="footerRegion"></span>
            <span data-i18n="footerEmail"></span>
            <span data-i18n="footerPhone"></span>
          </div>
          <p class="footer-legal" data-i18n="footerLegal"></p>
        </div>
      </footer>
    </div>

    <a class="mobile-request" href="#request" data-aria-i18n="mobileCtaLabel" data-i18n="mobileCta"></a>
    <script src="script.js"></script>
  </body>
</html>
